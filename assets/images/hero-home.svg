<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="Illustration of an accessible home with a ramp, stair lift and caring household">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcefe9"/><stop offset="1" stop-color="#f6efe2"/>
    </linearGradient>
  </defs>
  <rect width="760" height="560" rx="26" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="640" cy="92" r="46" fill="#f6c453" opacity=".85"/>
  <!-- ground -->
  <rect x="0" y="440" width="760" height="120" fill="#bcd9c2"/>
  <!-- house body -->
  <rect x="170" y="210" width="380" height="240" fill="#ffffff" stroke="#0f4c5c" stroke-width="5"/>
  <!-- roof -->
  <path d="M140 220 L360 90 L580 220 Z" fill="#0f4c5c"/>
  <path d="M173 210 L360 100 L547 210 Z" fill="#15677c"/>
  <rect x="455" y="120" width="34" height="70" fill="#9a3412"/>
  <!-- door -->
  <rect x="330" y="320" width="78" height="130" rx="6" fill="#9a3412"/>
  <circle cx="394" cy="388" r="5" fill="#f6c453"/>
  <!-- windows -->
  <g fill="#bfe3ec" stroke="#0f4c5c" stroke-width="4">
    <rect x="208" y="250" width="80" height="76" rx="4"/>
    <rect x="436" y="250" width="80" height="76" rx="4"/>
    <rect x="208" y="350" width="80" height="76" rx="4"/>
  </g>
  <g stroke="#0f4c5c" stroke-width="3">
    <line x1="248" y1="252" x2="248" y2="324"/><line x1="210" y1="288" x2="286" y2="288"/>
    <line x1="476" y1="252" x2="476" y2="324"/><line x1="438" y1="288" x2="514" y2="288"/>
    <line x1="248" y1="352" x2="248" y2="424"/><line x1="210" y1="388" x2="286" y2="388"/>
  </g>
  <!-- heart over door -->
  <path d="M369 288 c-1.2 0 -9.5-6.4 -9.5-12.4 c0-3.6 2.7-6.2 6-6.2 c2 0 3 1 3.5 1.9 c0.5-0.9 1.5-1.9 3.5-1.9 c3.3 0 6 2.6 6 6.2 c0 6 -8.3 12.4 -9.5 12.4 Z" fill="#9a3412"/>
  <!-- porch + ramp -->
  <rect x="318" y="450" width="104" height="14" fill="#8a9aa5"/>
  <path d="M422 450 L600 504 L600 518 L422 464 Z" fill="#aebdc6"/>
  <path d="M422 446 L600 500" stroke="#5b6b76" stroke-width="6" fill="none"/>
  <g stroke="#5b6b76" stroke-width="5">
    <line x1="440" y1="450" x2="440" y2="418"/>
    <line x1="500" y1="468" x2="500" y2="436"/>
    <line x1="560" y1="486" x2="560" y2="454"/>
  </g>
  <path d="M432 418 L568 456" stroke="#5b6b76" stroke-width="6" fill="none"/>
  <!-- wheelchair user on ramp -->
  <g transform="translate(488,392)">
    <circle cx="22" cy="50" r="20" fill="none" stroke="#1e293b" stroke-width="5"/>
    <circle cx="22" cy="50" r="4" fill="#1e293b"/>
    <circle cx="46" cy="58" r="8" fill="none" stroke="#1e293b" stroke-width="4"/>
    <path d="M14 8 q10 -2 14 6 l2 18 h16 l6 16" fill="none" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
    <circle cx="14" cy="0" r="9" fill="#e7b58c"/>
    <path d="M5 -3 a9 9 0 0 1 18 0 l-2 -1 q-7 -4 -14 0 Z" fill="#e8edf2"/>
  </g>
  <!-- shrubs -->
  <circle cx="120" cy="446" r="30" fill="#5f9e6e"/>
  <circle cx="92" cy="456" r="22" fill="#76b183"/>
  <circle cx="660" cy="452" r="26" fill="#5f9e6e"/>
  <!-- path -->
  <path d="M330 464 q-30 50 -90 70 l120 26 q40 -50 60 -86 Z" fill="#e4d9bf" opacity=".9"/>
</svg>
