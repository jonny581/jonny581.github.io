<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="AmeriGlide Hercules vertical platform lift in beige with platform, side panels and safety gate beside a porch">
  <rect width="800" height="600" fill="#e7f0ed"/>
  <!-- sky band + ground -->
  <rect x="0" y="0" width="800" height="470" fill="#ddebe9"/>
  <rect x="0" y="470" width="800" height="130" fill="#b9cdb4"/>
  <!-- house porch / deck at right -->
  <rect x="560" y="120" width="240" height="350" fill="#e9e2d2"/>
  <g fill="#d6cab2"><rect x="560" y="120" width="240" height="16"/><rect x="560" y="200" width="240" height="8"/><rect x="560" y="280" width="240" height="8"/><rect x="560" y="360" width="240" height="8"/></g>
  <rect x="560" y="248" width="240" height="20" fill="#8d9aa5"/>
  <rect x="560" y="268" width="240" height="202" fill="#aebdc6"/>
  <g stroke="#8d9aa5" stroke-width="6"><line x1="600" y1="268" x2="600" y2="470"/><line x1="660" y1="268" x2="660" y2="470"/><line x1="720" y1="268" x2="720" y2="470"/><line x1="780" y1="268" x2="780" y2="470"/></g>
  <rect x="560" y="178" width="14" height="78" fill="#6f7d88"/>
  <path d="M560 178 h240" stroke="#6f7d88" stroke-width="12"/>
  <!-- concrete pad -->
  <rect x="150" y="470" width="420" height="26" rx="4" fill="#c8cdd1"/>
  <!-- mast tower (beige) -->
  <rect x="180" y="80" width="86" height="396" rx="10" fill="#cfc3a6"/>
  <rect x="190" y="92" width="66" height="372" rx="8" fill="#ddd2b8"/>
  <rect x="196" y="110" width="54" height="120" rx="6" fill="#c5b896"/>
  <!-- controls on mast -->
  <rect x="204" y="130" width="38" height="58" rx="6" fill="#5b6671"/>
  <circle cx="223" cy="148" r="7" fill="#e25822"/>
  <circle cx="223" cy="170" r="7" fill="#2e7d32"/>
  <!-- platform -->
  <rect x="252" y="368" width="270" height="22" rx="6" fill="#8d9aa5"/>
  <rect x="258" y="360" width="258" height="12" rx="5" fill="#aab7c1"/>
  <g stroke="#6f7d88" stroke-width="3">
    <line x1="270" y1="364" x2="270" y2="372"/><line x1="300" y1="364" x2="300" y2="372"/>
    <line x1="330" y1="364" x2="330" y2="372"/><line x1="360" y1="364" x2="360" y2="372"/>
    <line x1="390" y1="364" x2="390" y2="372"/><line x1="420" y1="364" x2="420" y2="372"/>
    <line x1="450" y1="364" x2="450" y2="372"/><line x1="480" y1="364" x2="480" y2="372"/>
  </g>
  <!-- side panel walls -->
  <rect x="252" y="220" width="18" height="150" fill="#cfc3a6"/>
  <rect x="504" y="220" width="18" height="150" fill="#cfc3a6"/>
  <path d="M261 220 h252" stroke="#cfc3a6" stroke-width="14"/>
  <rect x="270" y="232" width="234" height="128" fill="#e8e0ca" opacity=".55"/>
  <!-- safety gate on platform end -->
  <g stroke="#9a3412" stroke-width="9">
    <line x1="513" y1="234" x2="513" y2="362"/>
    <line x1="468" y1="244" x2="468" y2="362"/>
    <path d="M513 252 h-50" /><path d="M513 322 h-50"/>
  </g>
  <!-- platform control post -->
  <rect x="282" y="262" width="14" height="100" fill="#5b6671"/>
  <rect x="272" y="244" width="36" height="26" rx="5" fill="#5b6671"/>
  <circle cx="290" cy="257" r="6" fill="#f6c453"/>
  <!-- under-platform scissor hint -->
  <path d="M268 392 l60 56 m0 -56 l-60 56" stroke="#7d8b96" stroke-width="8"/>
  <rect x="252" y="448" width="92" height="14" rx="6" fill="#7d8b96"/>
  <!-- shrubs -->
  <circle cx="92" cy="468" r="34" fill="#5f9e6e"/>
  <circle cx="58" cy="482" r="24" fill="#76b183"/>
  <ellipse cx="360" cy="508" rx="220" ry="16" fill="#7e927a" opacity=".35"/>
</svg>
