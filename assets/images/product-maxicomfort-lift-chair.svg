<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Golden MaxiComfort Cloud lift chair in chestnut fabric shown tilted forward in lift position with wired remote">
  <rect width="800" height="600" fill="#f4ece2"/>
  <!-- living room wall -->
  <rect x="0" y="0" width="800" height="470" fill="#efe3d3"/>
  <rect x="0" y="470" width="800" height="130" fill="#c9a878"/>
  <g stroke="#b89462" stroke-width="4"><line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="535" x2="800" y2="535"/><line x1="0" y1="570" x2="800" y2="570"/></g>
  <!-- framed picture + lamp -->
  <rect x="84" y="70" width="150" height="110" rx="6" fill="#fff" stroke="#9a3412" stroke-width="8"/>
  <path d="M96 160 l40 -52 l34 36 l26 -28 l32 44 Z" fill="#5f9e6e"/>
  <circle cx="150" cy="104" r="12" fill="#f6c453"/>
  <g>
    <rect x="652" y="320" width="12" height="150" fill="#5b6671"/>
    <path d="M610 320 h96 l-20 -70 h-56 Z" fill="#e9c46a"/>
    <ellipse cx="658" cy="476" rx="44" ry="10" fill="#4a5560"/>
  </g>
  <!-- rug -->
  <ellipse cx="400" cy="520" rx="280" ry="42" fill="#7f9c8d"/>
  <ellipse cx="400" cy="520" rx="220" ry="30" fill="#93b0a0"/>
  <!-- lift chair, tilted forward (lift position) -->
  <g transform="translate(280,150) rotate(8)">
    <!-- base lift frame exposed -->
    <path d="M30 318 l180 -6 l16 40 l-176 8 Z" fill="#5b6671"/>
    <path d="M60 318 l40 -44 m40 42 l40 -44" stroke="#414b56" stroke-width="9"/>
    <!-- seat base -->
    <rect x="18" y="232" width="220" height="56" rx="22" fill="#8a4b2e"/>
    <rect x="30" y="240" width="196" height="20" rx="10" fill="#a05a38"/>
    <!-- backrest: plush pillow back -->
    <rect x="158" y="20" width="92" height="232" rx="34" fill="#8a4b2e"/>
    <rect x="168" y="34" width="72" height="64" rx="26" fill="#a05a38"/>
    <rect x="168" y="106" width="72" height="64" rx="26" fill="#a05a38"/>
    <rect x="168" y="178" width="72" height="60" rx="26" fill="#a05a38"/>
    <!-- armrests plush -->
    <rect x="-22" y="148" width="92" height="124" rx="30" fill="#7a3f24"/>
    <rect x="-12" y="158" width="72" height="34" rx="17" fill="#925030"/>
    <!-- extended footrest -->
    <g transform="rotate(34 18 282)">
      <rect x="-92" y="270" width="116" height="30" rx="14" fill="#8a4b2e"/>
      <rect x="-84" y="276" width="100" height="12" rx="6" fill="#a05a38"/>
    </g>
    <!-- wired hand remote -->
    <path d="M-26 220 q-44 36 -30 96" stroke="#414b56" stroke-width="6" fill="none"/>
    <rect x="-80" y="306" width="46" height="86" rx="18" fill="#e8e8e6" stroke="#9aa3ab" stroke-width="3"/>
    <circle cx="-57" cy="330" r="9" fill="#2e7d32"/>
    <circle cx="-57" cy="354" r="9" fill="#c0392b"/>
    <rect x="-66" y="370" width="18" height="10" rx="5" fill="#5b6671"/>
  </g>
  <!-- side table with tea -->
  <g>
    <rect x="92" y="360" width="120" height="14" rx="6" fill="#8a6a44"/>
    <rect x="142" y="374" width="16" height="96" fill="#8a6a44"/>
    <ellipse cx="152" cy="474" rx="48" ry="9" fill="#74573a"/>
    <path d="M118 338 h44 v16 q0 10 -10 10 h-24 q-10 0 -10 -10 Z" fill="#fff" stroke="#9aa3ab" stroke-width="3"/>
    <path d="M162 344 q14 2 0 12" stroke="#9aa3ab" stroke-width="4" fill="none"/>
  </g>
</svg>
