<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="AmeriGlide Express residential dumbwaiter with oak cart carrying groceries inside a wall shaft">
  <rect width="800" height="600" fill="#f2ede3"/>
  <!-- kitchen wall -->
  <rect x="0" y="0" width="800" height="520" fill="#ece2cf"/>
  <rect x="0" y="520" width="800" height="80" fill="#b89a6a"/>
  <path d="M0 520 h800" stroke="#a3854f" stroke-width="6"/>
  <!-- counter at left -->
  <rect x="0" y="330" width="230" height="26" rx="6" fill="#8a6a44"/>
  <rect x="10" y="356" width="210" height="164" fill="#a98a5b"/>
  <g stroke="#94764a" stroke-width="5"><line x1="115" y1="356" x2="115" y2="520"/><line x1="14" y1="438" x2="216" y2="438"/></g>
  <g fill="#7a5f3c"><circle cx="100" cy="396" r="7"/><circle cx="130" cy="396" r="7"/><circle cx="100" cy="478" r="7"/><circle cx="130" cy="478" r="7"/></g>
  <!-- fruit bowl on counter -->
  <path d="M60 318 q40 26 80 0 l-8 14 q-32 16 -64 0 Z" fill="#9a3412"/>
  <circle cx="78" cy="312" r="11" fill="#c0392b"/><circle cx="100" cy="306" r="11" fill="#5f9e6e"/><circle cx="122" cy="312" r="11" fill="#e9c46a"/>
  <!-- shaft opening with trim -->
  <rect x="310" y="60" width="300" height="420" rx="8" fill="#5a4632"/>
  <rect x="296" y="46" width="328" height="20" rx="6" fill="#8a6a44"/>
  <rect x="296" y="480" width="328" height="20" rx="6" fill="#8a6a44"/>
  <rect x="290" y="46" width="20" height="454" rx="6" fill="#8a6a44"/>
  <rect x="610" y="46" width="20" height="454" rx="6" fill="#8a6a44"/>
  <!-- shaft interior dark -->
  <rect x="322" y="72" width="276" height="396" fill="#3b2f22"/>
  <!-- guide rails -->
  <rect x="334" y="72" width="10" height="396" fill="#6f7d88"/>
  <rect x="576" y="72" width="10" height="396" fill="#6f7d88"/>
  <!-- cables -->
  <line x1="430" y1="72" x2="430" y2="150" stroke="#9aa3ab" stroke-width="5"/>
  <line x1="490" y1="72" x2="490" y2="150" stroke="#9aa3ab" stroke-width="5"/>
  <!-- oak cart with two shelves -->
  <g>
    <rect x="352" y="150" width="216" height="250" rx="8" fill="#c89d6b"/>
    <rect x="362" y="160" width="196" height="230" rx="6" fill="#dcb887"/>
    <rect x="362" y="270" width="196" height="14" fill="#b98c58"/>
    <rect x="362" y="160" width="196" height="10" fill="#b98c58"/>
    <!-- groceries top shelf -->
    <rect x="380" y="196" width="58" height="72" rx="6" fill="#9a3412"/>
    <rect x="386" y="184" width="46" height="16" rx="4" fill="#7c2d12"/>
    <circle cx="476" cy="240" r="26" fill="#5f9e6e"/>
    <rect x="514" y="206" width="36" height="62" rx="6" fill="#2563ab"/>
    <!-- bottom shelf: laundry basket -->
    <path d="M380 318 h100 l-10 66 h-80 Z" fill="#e9c46a"/>
    <path d="M384 330 h92 m-90 16 h88 m-86 16 h84" stroke="#caa64e" stroke-width="5"/>
    <rect x="500" y="312" width="52" height="72" rx="8" fill="#8d9aa5"/>
  </g>
  <!-- call station -->
  <rect x="652" y="220" width="60 " height="100" rx="10" fill="#e8e8e6" stroke="#9aa3ab" stroke-width="4"/>
  <circle cx="682" cy="252" r="11" fill="#2e7d32"/>
  <circle cx="682" cy="288" r="11" fill="#c0392b"/>
  <ellipse cx="460" cy="556" rx="240" ry="14" fill="#8f7344" opacity=".4"/>
</svg>
