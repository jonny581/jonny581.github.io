<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="AmeriGlide toilet incline lift: powered frame with armrests and padded blue seat shown raised and tilted above a standard toilet">
  <rect width="800" height="600" fill="#eef0f4"/>
  <!-- bathroom wall, vertical panels -->
  <rect x="0" y="0" width="800" height="450" fill="#e4e9f0"/>
  <g stroke="#d2d9e4" stroke-width="5">
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <rect x="0" y="450" width="800" height="150" fill="#d8dde2"/>
  <g fill="#cbd1d8">
    <rect x="40" y="470" width="100" height="50" rx="3"/><rect x="160" y="470" width="100" height="50" rx="3"/>
    <rect x="280" y="470" width="100" height="50" rx="3"/><rect x="400" y="470" width="100" height="50" rx="3"/>
    <rect x="520" y="470" width="100" height="50" rx="3"/><rect x="640" y="470" width="100" height="50" rx="3"/>
  </g>
  <!-- toilet paper holder -->
  <rect x="106" y="200" width="14" height="56" rx="6" fill="#8d9aa5"/>
  <circle cx="113" cy="226" r="26" fill="#fff" stroke="#c4ccd4" stroke-width="4"/>
  <!-- toilet -->
  <g>
    <!-- tank -->
    <rect x="420" y="150" width="150" height="120" rx="14" fill="#ffffff" stroke="#b9c4cd" stroke-width="5"/>
    <rect x="410" y="138" width="170" height="26" rx="12" fill="#eef2f5" stroke="#c4ccd4" stroke-width="3"/>
    <rect x="530" y="110" width="34" height="14" rx="7" fill="#8d9aa5"/>
    <!-- bowl/pedestal -->
    <path d="M330 320 q0 -32 36 -32 h160 q40 0 40 38 v30 q0 80 -92 80 h-20 q-44 0 -44 58 h-26 q-10 -84 -54 -108 Z" fill="#ffffff" stroke="#b9c4cd" stroke-width="5"/>
    <path d="M424 444 h60 v44 h-72 Z" fill="#ffffff" stroke="#b9c4cd" stroke-width="5"/>
    <ellipse cx="446" cy="498" rx="84" ry="14" fill="#e8edf1" stroke="#b9c4cd" stroke-width="4"/>
  </g>
  <!-- ===== incline lift frame ===== -->
  <!-- rear vertical supports -->
  <g stroke="#6f7d88" stroke-width="14" stroke-linecap="round">
    <line x1="262" y1="496" x2="262" y2="290"/>
    <line x1="640" y1="496" x2="640" y2="290"/>
  </g>
  <rect x="230" y="490" width="86" height="16" rx="8" fill="#5b6671"/>
  <rect x="600" y="490" width="86" height="16" rx="8" fill="#5b6671"/>
  <!-- armrests: n-shaped, both sides -->
  <g stroke="#2c3138" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M262 292 q0 -50 50 -50 h60"/>
    <path d="M640 292 q0 -50 -50 -50 h-60"/>
  </g>
  <rect x="296" y="232" width="84" height="18" rx="9" fill="#414b56"/>
  <rect x="522" y="232" width="84" height="18" rx="9" fill="#414b56"/>
  <!-- lift actuator struts to seat -->
  <g stroke="#8d9aa5" stroke-width="12" stroke-linecap="round">
    <line x1="280" y1="380" x2="340" y2="302"/>
    <line x1="622" y1="380" x2="566" y2="290"/>
  </g>
  <!-- padded inclined seat, raised + tilted forward over the bowl -->
  <g transform="rotate(-16 450 300)">
    <rect x="330" y="284" width="240" height="34" rx="17" fill="#2563ab"/>
    <rect x="342" y="291" width="216" height="13" rx="6" fill="#3f7fc4"/>
    <ellipse cx="450" cy="301" rx="62" ry="10" fill="#1d4e87"/>
  </g>
  <!-- hand control -->
  <path d="M648 320 q44 8 44 70" stroke="#414b56" stroke-width="5" fill="none"/>
  <rect x="672" y="386" width="42" height="78" rx="16" fill="#e8e8e6" stroke="#9aa3ab" stroke-width="3"/>
  <circle cx="693" cy="410" r="8" fill="#2e7d32"/>
  <circle cx="693" cy="434" r="8" fill="#c0392b"/>
  <ellipse cx="455" cy="540" rx="260" ry="16" fill="#a7adb5" opacity=".4"/>
</svg>
