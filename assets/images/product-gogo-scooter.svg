<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Pride Go-Go Elite Traveller three-wheel travel mobility scooter with red shroud panels, black tiller and front basket">
  <rect width="800" height="600" fill="#eef2ec"/>
  <!-- park backdrop -->
  <rect x="0" y="0" width="800" height="440" fill="#e2eede"/>
  <circle cx="120" cy="380" r="80" fill="#9cc49a"/>
  <circle cx="200" cy="400" r="56" fill="#aed3a8"/>
  <circle cx="690" cy="370" r="92" fill="#9cc49a"/>
  <rect x="110" y="420" width="20" height="60" fill="#7a5a3a"/>
  <rect x="680" y="420" width="22" height="60" fill="#7a5a3a"/>
  <rect x="0" y="440" width="800" height="160" fill="#cdc4ae"/>
  <path d="M0 470 h800" stroke="#b8ad93" stroke-width="5"/>
  <!-- scooter, side profile facing left -->
  <g>
    <!-- rear wheel -->
    <circle cx="560" cy="452" r="52" fill="#23272c"/>
    <circle cx="560" cy="452" r="26" fill="#aab3ba"/>
    <circle cx="560" cy="452" r="9" fill="#5b6671"/>
    <!-- front wheel -->
    <circle cx="218" cy="458" r="44" fill="#23272c"/>
    <circle cx="218" cy="458" r="21" fill="#aab3ba"/>
    <circle cx="218" cy="458" r="8" fill="#5b6671"/>
    <!-- red base shroud -->
    <path d="M170 430 q-12 -36 36 -40 l150 -8 q20 -2 26 14 l10 26 h180 q44 0 50 30 l4 14 h-118 q-10 -28 -48 -28 t-48 28 h-130 q-8 -30 -44 -30 t-42 30 Z" fill="#c0392b"/>
    <path d="M196 396 l140 -8 q14 -1 19 10 l8 20 l-176 4 Z" fill="#e25f4d"/>
    <!-- battery pack under seat (black) -->
    <rect x="430" y="350" width="120" height="62" rx="12" fill="#2c3138"/>
    <rect x="440" y="358" width="100" height="20" rx="8" fill="#414b56"/>
    <!-- seat post -->
    <rect x="478" y="270" width="24" height="86" fill="#5b6671"/>
    <!-- swivel seat (black vinyl) -->
    <rect x="420" y="240" width="150" height="40" rx="18" fill="#2c3138"/>
    <rect x="430" y="246" width="130" height="14" rx="7" fill="#454e58"/>
    <rect x="540" y="96" width="38" height="158" rx="17" fill="#2c3138"/>
    <rect x="548" y="108" width="14" height="134" rx="7" fill="#454e58"/>
    <!-- armrest -->
    <path d="M548 168 q-92 -10 -116 50" fill="none" stroke="#1d2126" stroke-width="13" stroke-linecap="round"/>
    <!-- tiller -->
    <path d="M236 410 L300 160" stroke="#2c3138" stroke-width="20" stroke-linecap="round"/>
    <!-- handlebars (delta) -->
    <path d="M252 168 q48 -28 96 0" fill="none" stroke="#2c3138" stroke-width="14" stroke-linecap="round"/>
    <circle cx="252" cy="168" r="13" fill="#5b6671"/>
    <circle cx="348" cy="168" r="13" fill="#5b6671"/>
    <!-- tiller console -->
    <rect x="272" y="178" width="58" height="36" rx="10" fill="#414b56"/>
    <circle cx="290" cy="196" r="7" fill="#f6c453"/>
    <circle cx="312" cy="196" r="7" fill="#2e7d32"/>
    <!-- front basket -->
    <g>
      <rect x="170" y="220" width="96" height="74" rx="10" fill="none" stroke="#3d4852" stroke-width="6"/>
      <line x1="194" y1="222" x2="194" y2="292" stroke="#3d4852" stroke-width="4"/>
      <line x1="218" y1="222" x2="218" y2="292" stroke="#3d4852" stroke-width="4"/>
      <line x1="242" y1="222" x2="242" y2="292" stroke="#3d4852" stroke-width="4"/>
      <line x1="172" y1="246" x2="264" y2="246" stroke="#3d4852" stroke-width="4"/>
      <line x1="172" y1="270" x2="264" y2="270" stroke="#3d4852" stroke-width="4"/>
    </g>
    <!-- anti-tip rear wheels -->
    <circle cx="624" cy="476" r="14" fill="#3d4852"/>
  </g>
  <ellipse cx="400" cy="528" rx="300" ry="18" fill="#9a8f74" opacity=".4"/>
</svg>
