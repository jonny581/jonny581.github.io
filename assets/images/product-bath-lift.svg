<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="AmeriGlide reclining bath tub lift with white seat and blue waterproof hand control inside a bathtub">
  <rect width="800" height="600" fill="#e3eef4"/>
  <!-- tiled wall -->
  <rect x="0" y="0" width="800" height="430" fill="#d4e7ef"/>
  <g stroke="#bcd7e2" stroke-width="4">
    <line x1="0" y1="86" x2="800" y2="86"/><line x1="0" y1="172" x2="800" y2="172"/>
    <line x1="0" y1="258" x2="800" y2="258"/><line x1="0" y1="344" x2="800" y2="344"/>
    <line x1="133" y1="0" x2="133" y2="430"/><line x1="266" y1="0" x2="266" y2="430"/>
    <line x1="400" y1="0" x2="400" y2="430"/><line x1="533" y1="0" x2="533" y2="430"/>
    <line x1="666" y1="0" x2="666" y2="430"/>
  </g>
  <!-- floor -->
  <rect x="0" y="430" width="800" height="170" fill="#e8e3d8"/>
  <!-- window -->
  <rect x="560" y="60" width="170" height="130" rx="10" fill="#f2fbff" stroke="#9fc4d4" stroke-width="6"/>
  <line x1="645" y1="64" x2="645" y2="186" stroke="#9fc4d4" stroke-width="5"/>
  <!-- bathtub -->
  <path d="M90 300 q0 -22 26 -22 h470 q26 0 26 22 v110 q0 60 -64 60 h-394 q-64 0 -64 -60 Z" fill="#ffffff" stroke="#b9c8d2" stroke-width="5"/>
  <path d="M120 308 h472 v96 q0 40 -48 40 h-376 q-48 0 -48 -40 Z" fill="#dcecf4"/>
  <!-- water -->
  <path d="M124 352 h464 v52 q0 36 -44 36 h-376 q-44 0 -44 -36 Z" fill="#aed4e6"/>
  <path d="M140 360 q40 10 80 0 t80 0 t80 0 t80 0 t76 0" stroke="#8fc0d8" stroke-width="5" fill="none"/>
  <!-- faucet -->
  <rect x="556" y="236" width="16" height="48" rx="6" fill="#8d9aa5"/>
  <path d="M564 240 q40 -10 44 28" stroke="#8d9aa5" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- bath lift unit -->
  <g>
    <!-- base plate in tub -->
    <rect x="200" y="424" width="220" height="16" rx="8" fill="#cfd9e0"/>
    <!-- scissor lift -->
    <path d="M232 424 l72 -68 m0 68 l-72 -68" stroke="#9fb0bb" stroke-width="10" stroke-linecap="round"/>
    <!-- seat -->
    <rect x="186" y="338" width="200" height="26" rx="12" fill="#ffffff" stroke="#c2cfd8" stroke-width="4"/>
    <!-- reclining backrest -->
    <g transform="rotate(-14 366 344)">
      <rect x="350" y="178" width="34" height="172" rx="16" fill="#ffffff" stroke="#c2cfd8" stroke-width="4"/>
      <rect x="358" y="190" width="18" height="148" rx="9" fill="#e3edf3"/>
    </g>
    <!-- side transfer flap -->
    <rect x="120" y="340" width="70" height="20" rx="10" fill="#eef4f8" stroke="#c2cfd8" stroke-width="4"/>
    <!-- hand control (blue, floating) -->
    <path d="M388 300 q60 -36 96 -10" stroke="#5b6671" stroke-width="6" fill="none"/>
    <rect x="468" y="252" width="56" height="92" rx="24" fill="#2563ab"/>
    <circle cx="496" cy="282" r="12" fill="#ffffff"/>
    <circle cx="496" cy="316" r="12" fill="#f6c453"/>
  </g>
  <!-- bath mat + slippers -->
  <rect x="560" y="492" width="160" height="36" rx="14" fill="#9a3412" opacity=".85"/>
  <ellipse cx="606" cy="548" rx="26" ry="12" fill="#5b6671"/>
  <ellipse cx="662" cy="548" rx="26" ry="12" fill="#5b6671"/>
  <ellipse cx="350" cy="540" rx="240" ry="16" fill="#b9aa90" opacity=".3"/>
</svg>
